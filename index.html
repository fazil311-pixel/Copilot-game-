<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Carrom Disc Pool Style</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: system-ui, sans-serif;
      color: #fff;
    }

    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .board {
      position: relative;
      width: 480px;
      height: 480px;
      background: radial-gradient(circle at 30% 30%, #f7e0b2, #c28b4b);
      border-radius: 24px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
      overflow: hidden;
    }

    /* Pockets */
    .pocket {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #000;
    }
    .pocket.tl { top: -10px; left: -10px; }
    .pocket.tr { top: -10px; right: -10px; }
    .pocket.bl { bottom: -10px; left: -10px; }
    .pocket.br { bottom: -10px; right: -10px; }

    /* Coins */
    .coin {
      position: absolute;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.4);
    }
    .coin.white {
      background: radial-gradient(circle at 30% 30%, #fff, #d0d0d0);
      border: 2px solid #eee;
    }
    .coin.black {
      background: radial-gradient(circle at 30% 30%, #444, #111);
      border: 2px solid #000;
    }
    .coin.red {
      background: radial-gradient(circle at 30% 30%, #ff5b5b, #b00000);
      border: 2px solid #ffb3b3;
    }

    /* Striker */
    .striker {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fdfdfd, #bbbbbb);
      border: 3px solid #888;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
      cursor: pointer;
      transform: translate(-50%, -50%);
    }

    /* Aim line */
    .aim-line {
      position: absolute;
      height: 2px;
      background: rgba(0, 255, 0, 0.7);
      transform-origin: left center;
      pointer-events: none;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #222;
      padding: 10px 16px;
      border-radius: 999px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
    }

    .controls label {
      font-size: 14px;
      opacity: 0.8;
    }

    .controls input[type="range"] {
      width: 160px;
    }

    .shoot-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #ffb347, #ff5f6d);
      color: #111;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(255, 95, 109, 0.6);
    }

    .shoot-btn:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="board" id="board">
      <!-- Pockets -->
      <div class="pocket tl"></div>
      <div class="pocket tr"></div>
      <div class="pocket bl"></div>
      <div class="pocket br"></div>

      <!-- Coins (simple cluster in center) -->
      <div class="coin white" style="top: 50%; left: 50%; transform: translate(-60%, -60%);"></div>
      <div class="coin white" style="top: 50%; left: 50%; transform: translate(-20%, -60%);"></div>
      <div class="coin white" style="top: 50%; left: 50%; transform: translate(-60%, -20%);"></div>
      <div class="coin white" style="top: 50%; left: 50%; transform: translate(-20%, -20%);"></div>

      <div class="coin black" style="top: 50%; left: 50%; transform: translate(20%, -60%);"></div>
      <div class="coin black" style="top: 50%; left: 50%; transform: translate(60%, -60%);"></div>
      <div class="coin black" style="top: 50%; left: 50%; transform: translate(20%, -20%);"></div>
      <div class="coin black" style="top: 50%; left: 50%; transform: translate(60%, -20%);"></div>

      <!-- Queen -->
      <div class="coin red" style="top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>

      <!-- Striker -->
      <div class="striker" id="striker"></div>

      <!-- Aim line -->
      <div class="aim-line" id="aimLine"></div>
    </div>

    <div class="controls">
      <label>Power</label>
      <input type="range" id="power" min="10" max="100" value="40" />
      <button class="shoot-btn" id="shootBtn">Shoot</button>
    </div>
  </div>

  <script>
    const board = document.getElementById('board');
    const striker = document.getElementById('striker');
    const aimLine = document.getElementById('aimLine');
    const powerInput = document.getElementById('power');
    const shootBtn = document.getElementById('shootBtn');

    const boardRect = () => board.getBoundingClientRect();

    // Initial striker position (bottom center)
    function resetStriker() {
      const rect = boardRect();
      striker.dataset.x = rect.width / 2;
      striker.dataset.y = rect.height - 40;
      updateStrikerPosition();
      hideAimLine();
    }

    function updateStrikerPosition() {
      const x = parseFloat(striker.dataset.x);
      const y = parseFloat(striker.dataset.y);
      striker.style.left = x + 'px';
      striker.style.top = y + 'px';
    }

    // Drag striker horizontally
    let dragging = false;

    striker.addEventListener('mousedown', (e) => {
      dragging = true;
    });

    window.addEventListener('mouseup', () => {
      dragging = false;
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const rect = boardRect();
      let x = e.clientX - rect.left;
      const y = parseFloat(striker.dataset.y);

      // Clamp to board width
      x = Math.max(40, Math.min(rect.width - 40, x));
      striker.dataset.x = x;
      striker.dataset.y = y;
      updateStrikerPosition();
    });

    // Aim line: angle based on mouse position over board
    board.addEventListener('mousemove', (e) => {
      const rect = boardRect();
      const sx = parseFloat(striker.dataset.x);
      const sy = parseFloat(striker.dataset.y);

      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      const dx = mx - sx;
      const dy = my - sy;

      const angle = Math.atan2(dy, dx); // radians
      const length = 120;

      aimLine.style.left = sx + 'px';
      aimLine.style.top = sy + 'px';
      aimLine.style.width = length + 'px';
      aimLine.style.transform = `rotate(${angle}rad)`;
      aimLine.style.opacity = 1;

      striker.dataset.angle = angle;
    });

    function hideAimLine() {
      aimLine.style.opacity = 0;
    }

    // Simple "shoot" animation (no real physics yet)
    shootBtn.addEventListener('click', () => {
      const angle = parseFloat(striker.dataset.angle || -Math.PI / 2);
      const power = parseFloat(powerInput.value);
      const steps = 20;
      let step = 0;

      const startX = parseFloat(striker.dataset.x);
      const startY = parseFloat(striker.dataset.y);

      const dx = Math.cos(angle) * power * 0.4;
      const dy = Math.sin(angle) * power * 0.4;

      hideAimLine();

      const interval = setInterval(() => {
        step++;
        const x = startX + dx * step;
        const y = startY + dy * step;

        striker.dataset.x = x;
        striker.dataset.y = y;
        updateStrikerPosition();

        if (step >= steps) {
          clearInterval(interval);
          // Reset after shot
          setTimeout(resetStriker, 400);
        }
      }, 16);
    });

    resetStriker();
  </script>
</body>
</html>
